upstream frontend {
    server frontend:3000;
}

upstream api {
    server api:3001;
}

upstream keycloak {
    server keycloak:8080;
}

# Port 80 — HTTP: serve ACME challenge files, redirect everything else to HTTPS
server {
    listen 80;
    server_name www.angrybirdman.org;

    # Certbot webroot renewal — nginx serves challenge files so cert can renew
    # while the application is running (no downtime required)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Port 443 — Application (HTTPS)
server {
    listen 443 ssl;
    server_name www.angrybirdman.org;

    # Let's Encrypt certificate
    ssl_certificate /etc/letsencrypt/live/www.angrybirdman.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.angrybirdman.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 10M;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Health check endpoint (used by GitHub Actions deployment verification)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Authentication endpoints (no /api prefix — matches Fastify auth routes)
    location /auth/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # API backend
    location /api/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Frontend application
    location / {
        proxy_pass http://frontend/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

# Port 8443 — Keycloak (HTTPS)
# nginx terminates TLS; KC_PROXY: edge tells Keycloak to trust X-Forwarded-* headers
server {
    listen 8443 ssl;
    server_name www.angrybirdman.org;

    # Same Let's Encrypt certificate as the application
    ssl_certificate /etc/letsencrypt/live/www.angrybirdman.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.angrybirdman.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Proxy all requests to Keycloak's internal HTTP listener
    location / {
        proxy_pass http://keycloak;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # These two headers are required so Keycloak generates correct https:// redirect URIs
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 8443;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Keycloak responses (especially admin UI) can be large
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
        proxy_busy_buffers_size 64k;
    }
}
